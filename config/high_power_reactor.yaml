# IC2 核反应堆配置文件 - 高功率设计
# 使用四联燃料棒和中子反射板实现高功率输出

reactor_name: "高功率反应堆 - 四联燃料棒配置"

layout:
  - ["E", "E", "E", "E", "E", "E"]
  - ["E", "N", "Q", "N", "E", "E"]
  - ["E", "CH", "C60", "C60", "CH", "E"]
  - ["E", "N", "Q", "N", "E", "E"]
  - ["E", "E", "E", "E", "E", "E"]
  - ["E", "O", "O", "O", "O", "E"]
  - ["E", "O", "O", "O", "O", "E"]
  - ["E", "R", "R", "R", "R", "E"]
  - ["E", "E", "E", "E", "E", "E"]

simulation:
  duration: 20000
  time_step: 1
  speed_multiplier: 1.0
  sample_interval: 20

visualization:
  enable_realtime: true
  update_interval: 100
  charts:
    - power_output
    - heat_distribution
    - reactor_heat
    - component_status
  temperature_colormap: "hot"
  output_dir: "output"

reactor_parameters:
  max_hull_heat: 10000
  explosion_threshold: 10000
  ambient_temperature: 0
